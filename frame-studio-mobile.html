<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Frame Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:#060606;color:#e0dcd6;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 300px 250px at 20% 20%, rgba(150,100,200,.15) 0%, transparent 50%),
    radial-gradient(ellipse 280px 220px at 80% 80%, rgba(100,200,200,.12) 0%, transparent 50%),
    radial-gradient(ellipse 200px 200px at 50% 50%, rgba(255,180,100,.10) 0%, transparent 50%);
  animation:bgPulse 10s ease-in-out infinite}
@keyframes bgPulse{0%,100%{opacity:1}50%{opacity:.7}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:.5px solid rgba(255,255,255,.08);background:rgba(6,6,6,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:8px}
.lmark{width:28px;height:28px;border:.5px solid rgba(255,255,255,.18);border-radius:6px;display:flex;align-items:center;justify-content:center}
.lmark svg{width:15px;height:15px;stroke:#e0dcd6;fill:none;stroke-width:1.5}
.lname{font-size:14px;font-weight:600}
.badge{display:flex;align-items:center;gap:5px;padding:3px 10px;border:.5px solid rgba(255,255,255,.15);border-radius:16px;font-size:10px;color:rgba(224,220,214,.5)}
.dot{width:6px;height:6px;border-radius:50%;background:#55d88c;animation:dp 2s ease-in-out infinite}
.dot.offline{background:#ff5555}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.2}}

/* ── HERO ── */
.hero{position:relative;height:50vh;min-height:280px;overflow:hidden;display:flex;align-items:flex-end;background:#050505}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;opacity:.85}
.vig{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(5,5,5,.95) 0%,rgba(5,5,5,.4) 40%,transparent 70%)}
.hc{position:relative;z-index:3;width:100%;padding:0 20px 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem}
.ht{font-size:clamp(36px,12vw,64px);font-weight:300;letter-spacing:-2px;line-height:.9;opacity:0;transform:translateY(20px);animation:fu 1.2s cubic-bezier(.16,1,.3,1) .2s forwards}
.ht em{font-style:italic;color:rgba(224,220,214,.2)}
.hr{text-align:right;opacity:0;transform:translateY(12px);animation:fu 1.2s cubic-bezier(.16,1,.3,1) .4s forwards;flex-shrink:0}
.hn{font-size:clamp(40px,15vw,72px);font-weight:200;letter-spacing:-3px;line-height:1}
.hl{font-size:9px;color:rgba(224,220,214,.3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
@keyframes fu{to{opacity:1;transform:translateY(0)}}

/* ── MAIN ── */
.main{padding:56px 16px 90px;position:relative;z-index:1}

/* section label */
.ew{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(224,220,214,.3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ew::after{content:'';flex:1;height:.5px;background:rgba(255,255,255,.06)}

/* ── STATUS BAR ── */
.status-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0d0d0d;border:.5px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:16px;font-size:12px;color:rgba(224,220,214,.4)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#55d88c}
.status-dot.offline{background:#ff5555}

/* ── UPLOAD ── */
.upz{width:100%;padding:24px 16px;border:.5px dashed rgba(255,255,255,.2);border-radius:12px;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;position:relative;transition:background .2s,border-color .2s}
.upz:active,.upz.drag{background:#151515;border-color:rgba(255,255,255,.35)}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upico{width:48px;height:48px;border:.5px solid rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;background:#181818;margin-bottom:4px}
.upico svg{width:22px;height:22px;stroke:rgba(224,220,214,.5);fill:none;stroke-width:1.5}
.ut{font-size:15px;font-weight:500}
.us{font-size:11px;color:rgba(224,220,214,.35);text-align:center;max-width:280px;line-height:1.6}
.fmts{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.fmt{font-size:9px;padding:2px 8px;border-radius:12px;border:.5px solid rgba(255,255,255,.12);color:rgba(224,220,214,.35)}

/* ── TABS ── */
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.pg-count{font-size:10px;padding:2px 8px;border-radius:12px;border:.5px solid rgba(255,255,255,.1);color:rgba(224,220,214,.4)}
.pg-tabs{display:flex;gap:6px}
.pg-tab{flex:1;padding:9px 0;background:#0d0d0d;border:.5px solid rgba(255,255,255,.1);border-radius:8px;font-size:12px;color:rgba(224,220,214,.4);cursor:pointer;text-align:center;transition:all .15s}
.pg-tab:active{background:#181818}
.pg-tab.active{color:#e0dcd6;background:#181818;border-color:rgba(255,255,255,.2)}

/* ── GALLERY ── */
.gm{columns:1;column-gap:12px}
.gm.c2{columns:1}

.gc2{break-inside:avoid;margin-bottom:12px;border-radius:12px;overflow:hidden;border:.5px solid rgba(255,255,255,.1);background:#0d0d0d;position:relative;cursor:pointer;opacity:0;transform:translateY(10px);animation:ci .4s cubic-bezier(.16,1,.3,1) forwards}
@keyframes ci{to{opacity:1;transform:translateY(0)}}
.gc2 img{width:100%;display:block;transition:transform .4s ease,filter .3s;filter:grayscale(10%) brightness(.9)}
.gc2:active img{transform:scale(1.02);filter:grayscale(0%) brightness(1)}
.gc2:hover img{transform:scale(1.02);filter:grayscale(0%) brightness(1)}
.ov{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.3),transparent);display:flex;flex-direction:column;justify-content:flex-end}
.on2{font-size:12px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.om{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.oas{display:flex;gap:6px;margin-top:8px}
.ob{flex:1;padding:7px 4px;background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.15);border-radius:6px;font-size:10px;color:#fff;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:3px}
.ob:active{background:rgba(255,255,255,.18)}
.ob svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}

/* status badges */
.st-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:9px}
.st-pending{background:rgba(255,200,80,.15);color:#e8b84a;border:.5px solid rgba(255,200,80,.4)}
.st-processing{background:rgba(80,160,255,.15);color:#5aa0ff;border:.5px solid rgba(80,160,255,.4)}
.st-completed{background:rgba(80,220,140,.15);color:#55d88c;border:.5px solid rgba(80,220,140,.4)}
.st-error{background:rgba(255,80,80,.15);color:#ff5555;border:.5px solid rgba(255,80,80,.4)}
.st-spinner{width:9px;height:9px;border:1.5px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.processed-tag{position:absolute;top:8px;right:8px;z-index:2;padding:2px 7px;background:rgba(80,220,140,.2);border:.5px solid rgba(80,220,140,.4);border-radius:10px;font-size:9px;color:#55d88c}

/* empty */
.emp{padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;border:.5px dashed rgba(255,255,255,.1);border-radius:12px;background:#0d0d0d}
.ei{width:48px;height:48px;border:.5px solid rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.ei svg{width:22px;height:22px;stroke:rgba(224,220,214,.3);fill:none;stroke-width:1.5}
.et{font-size:14px;font-weight:500;color:rgba(224,220,214,.5)}
.es{font-size:11px;color:rgba(224,220,214,.3)}

/* lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:999;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:95vw;max-height:88vh;border-radius:10px}
.lx{position:fixed;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,.1);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lx svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:68px;background:rgba(6,6,6,.95);border-top:.5px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-around;padding:0 8px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.bottom-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:10px;transition:background .15s}
.bottom-btn:active{background:rgba(255,255,255,.08)}
.bottom-btn svg{width:20px;height:20px;stroke:rgba(224,220,214,.5);fill:none;stroke-width:1.5}
.bottom-btn span{font-size:9px;color:rgba(224,220,214,.4)}
.bottom-btn.active svg{stroke:#e0dcd6}
.bottom-btn.active span{color:#e0dcd6}

/* floating add */
.fab{position:fixed;bottom:84px;right:20px;z-index:90;width:54px;height:54px;background:#e0dcd6;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab input{position:absolute;inset:0;opacity:0;cursor:pointer}
.fab svg{width:22px;height:22px;stroke:#060606;fill:none;stroke-width:2.5}

/* ── DESKTOP ── */
@media(min-width:768px){
  nav{height:54px;padding:0 24px}
  .logo{gap:10px}
  .lmark{width:30px;height:30px}
  .lname{font-size:15px}
  .badge{padding:4px 12px;font-size:11px}
  .dot{width:7px;height:7px}
  
  .hero{height:60vh;min-height:400px;max-height:600px}
  #cv{opacity:1}
  .hc{padding:0 32px 40px}
  .ht{font-size:clamp(48px,8vw,88px);letter-spacing:-3px}
  .hn{font-size:clamp(48px,10vw,80px)}
  .hl{font-size:10px}
  
  .main{max-width:640px;margin:0 auto;padding:64px 24px 100px}
  .ew{font-size:11px;margin-bottom:12px}
  .upz{padding:32px 20px}
  .upico{width:52px;height:52px}
  .ut{font-size:16px}
  .us{font-size:12px;max-width:320px}
  .fmt{font-size:10px;padding:2px 9px}
  
  .pg-header{margin-bottom:16px}
  .pg-count{font-size:11px}
  .pg-tab{flex:none;padding:8px 16px;font-size:12px}
  
  .gm{columns:2;column-gap:14px}
  .gc2{margin-bottom:14px}
  .om{font-size:11px}
  .oas{gap:8px}
  .ob{padding:8px}
  
  .bottom-bar{display:none}
  .fab{display:none}
}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="lmark"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="1.5"/><line x1="1" y1="5.5" x2="13" y2="5.5"/><line x1="5.5" y1="5.5" x2="5.5" y2="13"/></svg></div>
    <div class="lname">Frame Studio</div>
  </div>
  <div class="badge">
    <div class="dot" id="navDot"></div>
    <span id="navStatus">Unity</span>
  </div>
</nav>

<div class="hero">
  <canvas id="cv"></canvas>
  <div class="vig"></div>
  <div class="hc">
    <div class="ht">图片<br><em>画廊</em></div>
    <div class="hr">
      <div class="hn" id="hn">0</div>
      <div class="hl">张图片</div>
    </div>
  </div>
</div>

<div class="main">

  <div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <div>
    <div class="ew">上传图片</div>
    <div class="upz" id="dz">
      <input type="file" accept="image/*" multiple onchange="uploadToServer(this.files)"/>
      <div class="upico"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <div class="ut">点击上传图片</div>
      <div class="us">上传后自动进行 Unity 处理</div>
      <div class="fmts"><span class="fmt">JPG</span><span class="fmt">PNG</span><span class="fmt">WEBP</span></div>
    </div>
  </div>

  <div>
    <div class="pg-header">
      <div>
        <div class="ew" style="margin-bottom:0">处理任务</div>
      </div>
      <span class="pg-count" id="pgCount">0 个</span>
      <div class="pg-tabs">
        <div class="pg-tab active" onclick="switchTab('all',this)">全部</div>
        <div class="pg-tab" onclick="switchTab('processing',this)">进行中</div>
        <div class="pg-tab" onclick="switchTab('completed',this)">完成</div>
      </div>
    </div>
    <div id="processGallery"></div>
  </div>

  <div>
    <div class="ew">本地预览</div>
    <span class="pg-count" id="gct">0 张</span>
    <div id="gallery" style="margin-top:12px"></div>
  </div>

</div>

<div class="fab">
  <input type="file" accept="image/*" multiple onchange="uploadToServer(this.files);addF(this.files)"/>
  <svg viewBox="0 0 10 10"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>
</div>

<div class="lb" id="lb" onclick="clb()">
  <div class="lx" onclick="clb()"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></div>
  <img id="lbi" src="" alt=""/>
</div>

<script>
/* ═══════════════════════════════════════════
   CANVAS — shattered glass art background
   ═══════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('cv');
  const cx=cv.getContext('2d');
  let W,H,raf,T=0,MX=-1,MY=-1;
  const R=(a,b)=>a+Math.random()*(b-a);
  const lerp=(a,b,k)=>a+(b-a)*k;
  
  let SHARDS=[],METAL_BARS=[],FLOATING_PARTS=[],GLASS_PANELS=[],DOTS=[],LINES=[];

  function isMobile(){return window.innerWidth<768;}

  function genShard(x,y,r){
    const n=Math.floor(R(5,9));
    const pts=[];
    for(let i=0;i<n;i++){
      const ang=(i/n)*Math.PI*2+R(-.3,.3);
      const rr=r*R(.6,1.2);
      pts.push({x:x+Math.cos(ang)*rr,y:y+Math.sin(ang)*rr});
    }
    return pts;
  }

  function genGlassPanel(){
    const n=Math.floor(R(4,6));
    const pts=[];
    const cxp=R(W*.1,W*.9);
    const cyp=R(H*.1,H*.9);
    const baseR=R(60,180);
    for(let i=0;i<n;i++){
      const ang=(i/n)*Math.PI*2;
      const rr=baseR*R(.7,1.3);
      pts.push({x:cxp+Math.cos(ang)*rr,y:cyp+Math.sin(ang)*rr});
    }
    return {pts,ox:cxp,oy:cyp,rot:R(0,Math.PI*2),rs:R(-.0003,.0003),scale:R(.8,1.2),opacity:R(.015,.06)};
  }

  function init(){
    W=cv.width=cv.offsetWidth;
    H=cv.height=cv.offsetHeight;
    const m=isMobile();
    const sc=m?.55:1;

    SHARDS=[];
    const shardCount=Math.floor((m?45:80)*sc);
    for(let i=0;i<shardCount;i++){
      const cxp=R(0,W),cyp=R(0,H);
      const r=R(m?15:20,m?50:80);
      const pts=genShard(cxp,cyp,r);
      SHARDS.push({
        pts,ox:cxp,oy:cyp,r,
        rot:R(0,Math.PI*2),rs:R(-.0008,.0008),
        tx:R(-.3,.3),ty:R(-.3,.3),
        opacity:R(.02,.08),
        thickness:R(.3,1.2),
        color:Math.random()>.5?'rgba(255,255,255,':'rgba(200,220,255,'
      });
    }

    METAL_BARS=[];
    const barCount=Math.floor((m?12:25)*sc);
    for(let i=0;i<barCount;i++){
      const isH=Math.random()>.5;
      const x1=R(0,W),y1=R(0,H);
      const len=R(m?50:80,m?200:350);
      METAL_BARS.push({
        x1,y1,
        x2:isH?x1+len:x1,
        y2:isH?y1:y1+len,
        width:R(1.5,4),
        opacity:R(.08,.2),
        phase:R(0,Math.PI*2),
        spd:R(.002,.005)
      });
    }

    FLOATING_PARTS=[];
    const fpCount=Math.floor((m?18:35)*sc);
    for(let i=0;i<fpCount;i++){
      const t=['rect','circle','square','ring'][Math.floor(R(0,4))];
      FLOATING_PARTS.push({
        x:R(0,W),y:R(0,H),
        w:R(15,60),h:R(15,60),r:R(10,40),
        t,
        rot:R(0,Math.PI*2),rs:R(-.0006,.0006),
        tx:R(-.2,.2),ty:R(-.2,.2),
        opacity:R(.04,.12),
        thickness:R(.3,.8),
        color:Math.random()>.3?'rgba(255,255,255,':'rgba(180,190,220,'
      });
    }

    GLASS_PANELS=[];
    const gpCount=Math.floor((m?4:8)*sc);
    for(let i=0;i<gpCount;i++){
      GLASS_PANELS.push(genGlassPanel());
    }

    DOTS=[];
    const dotCount=Math.floor((m?60:120)*sc);
    for(let i=0;i<dotCount;i++){
      DOTS.push({
        x:R(0,W),y:R(0,H),r:R(.5,2),
        opacity:R(.05,.25),
        phase:R(0,Math.PI*2),
        spd:R(.001,.004),
        pulse:R(.5,1.5)
      });
    }

    LINES=[];
    const lineCount=Math.floor((m?25:50)*sc);
    for(let i=0;i<lineCount;i++){
      LINES.push({
        x1:R(0,W),y1:R(0,H),
        x2:R(0,W),y2:R(0,H),
        opacity:R(.01,.05),
        phase:R(0,Math.PI*2),
        spd:R(.002,.006)
      });
    }
  }

  function drGlassPanels(){
    GLASS_PANELS.forEach(p=>{
      p.rot+=p.rs;
      cx.save();
      cx.translate(p.ox,p.oy);
      cx.rotate(p.rot);
      cx.globalAlpha=p.opacity;
      
      cx.beginPath();
      p.pts.forEach((pt,i)=>{
        const dx=pt.x-p.ox,dy=pt.y-p.oy;
        if(i===0)cx.moveTo(dx*p.scale,dy*p.scale);
        else cx.lineTo(dx*p.scale,dy*p.scale);
      });
      cx.closePath();
      cx.strokeStyle='rgba(255,255,255,.3)';
      cx.lineWidth=.5;
      cx.stroke();
      
      const g=cx.createLinearGradient(-p.rs*200,0,p.rs*200,0);
      g.addColorStop(0,'rgba(255,255,255,.02)');
      g.addColorStop(.5,'rgba(200,220,255,.03)');
      g.addColorStop(1,'rgba(255,255,255,.02)');
      cx.fillStyle=g;
      cx.fill();
      
      cx.restore();
    });
  }

  function drShards(){
    SHARDS.forEach(s=>{
      s.rot+=s.rs;
      s.ox+=s.tx;s.oy+=s.ty;
      if(s.ox<0)s.ox=W;if(s.ox>W)s.ox=0;
      if(s.oy<0)s.oy=H;if(s.oy>H)s.oy=0;

      cx.save();
      cx.translate(s.ox,s.oy);
      cx.rotate(s.rot);

      cx.beginPath();
      s.pts.forEach((pt,i)=>{
        const dx=pt.x-s.ox,dy=pt.y-s.oy;
        if(i===0)cx.moveTo(dx,dy);
        else cx.lineTo(dx,dy);
      });
      cx.closePath();

      const g=cx.createLinearGradient(-50,-50,50,50);
      g.addColorStop(0,s.color+s.opacity*.8+')');
      g.addColorStop(.5,s.color+s.opacity*.4+')');
      g.addColorStop(1,s.color+s.opacity+')');
      cx.fillStyle=g;
      cx.fill();

      cx.strokeStyle='rgba(255,255,255,'+(s.opacity*.6)+')';
      cx.lineWidth=s.thickness;
      cx.stroke();

      cx.restore();
    });
  }

  function drMetalBars(){
    METAL_BARS.forEach(b=>{
      const a=b.opacity*(.6+.4*Math.sin(T*b.spd+b.phase));
      cx.save();
      
      const g=cx.createLinearGradient(b.x1,b.y1,b.x2,b.y2);
      g.addColorStop(0,'rgba(220,220,220,0)');
      g.addColorStop(.2,'rgba(255,255,255,'+(a*.8)+')');
      g.addColorStop(.5,'rgba(200,200,200,'+a+')');
      g.addColorStop(.8,'rgba(255,255,255,'+(a*.8)+')');
      g.addColorStop(1,'rgba(220,220,220,0)');
      
      cx.beginPath();
      cx.moveTo(b.x1,b.y1);
      cx.lineTo(b.x2,b.y2);
      cx.strokeStyle=g;
      cx.lineWidth=b.width;
      cx.lineCap='round';
      cx.stroke();
      
      const midX=(b.x1+b.x2)/2,midY=(b.y1+b.y2)/2;
      const glow=cx.createRadialGradient(midX,midY,0,midX,midY,b.width*3);
      glow.addColorStop(0,'rgba(255,255,255,'+(a*.3)+')');
      glow.addColorStop(1,'rgba(255,255,255,0)');
      cx.fillStyle=glow;
      cx.fillRect(midX-50,midY-50,100,100);
      
      cx.restore();
    });
  }

  function drFloatingParts(){
    FLOATING_PARTS.forEach(p=>{
      p.rot+=p.rs;
      p.x+=p.tx;p.y+=p.ty;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;

      cx.save();
      cx.translate(p.x,p.y);
      cx.rotate(p.rot);
      cx.globalAlpha=p.opacity;

      switch(p.t){
        case'rect':
          cx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
          break;
        case'square':
          cx.strokeRect(-p.w/2,-p.w/2,p.w,p.w);
          break;
        case'circle':
          cx.beginPath();cx.arc(0,0,p.r,0,Math.PI*2);cx.stroke();
          break;
        case'ring':
          cx.beginPath();cx.arc(0,0,p.r,0,Math.PI*2);cx.stroke();
          cx.beginPath();cx.arc(0,0,p.r*.6,0,Math.PI*2);cx.stroke();
          break;
      }

      cx.strokeStyle=p.color+p.opacity+')';
      cx.lineWidth=p.thickness;
      cx.restore();
    });
  }

  function drDots(){
    DOTS.forEach(d=>{
      const a=d.opacity*(.5+.5*Math.sin(T*d.spd+d.phase));
      const r=d.r*d.pulse*(.8+.2*Math.sin(T*d.spd*2+d.phase));
      
      const glow=cx.createRadialGradient(d.x,d.y,0,d.x,d.y,r*4);
      glow.addColorStop(0,'rgba(255,255,255,'+(a*.4)+')');
      glow.addColorStop(1,'rgba(255,255,255,0)');
      cx.fillStyle=glow;
      cx.beginPath();cx.arc(d.x,d.y,r*4,0,Math.PI*2);cx.fill();
      
      cx.fillStyle='rgba(255,255,255,'+a+')';
      cx.beginPath();cx.arc(d.x,d.y,r,0,Math.PI*2);cx.fill();
    });
  }

  function drLines(){
    LINES.forEach(l=>{
      const a=l.opacity*(.4+.6*Math.sin(T*l.spd+l.phase));
      cx.beginPath();
      cx.moveTo(l.x1,l.y1);
      cx.lineTo(l.x2,l.y2);
      cx.strokeStyle='rgba(255,255,255,'+a+')';
      cx.lineWidth=.3;
      cx.stroke();
    });
  }

  function drMouseGlow(){
    if(MX<0)return;
    const m=isMobile();
    const radius=m?150:300;
    const g=cx.createRadialGradient(MX,MY,0,MX,MY,radius);
    g.addColorStop(0,'rgba(255,255,255,.06)');
    g.addColorStop(.3,'rgba(200,220,255,.03)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    cx.fillStyle=g;
    cx.fillRect(MX-radius,MY-radius,radius*2,radius*2);
  }

  function frame(ts){
    T=ts;
    cx.clearRect(0,0,W,H);
    
    drGlassPanels();
    drLines();
    drDots();
    drMetalBars();
    drShards();
    drFloatingParts();
    drMouseGlow();
    
    raf=requestAnimationFrame(frame);
  }

  function start(){if(raf)cancelAnimationFrame(raf);init();raf=requestAnimationFrame(frame);}

  document.querySelector('.hero').addEventListener('mousemove',e=>{
    const r=cv.getBoundingClientRect();MX=e.clientX-r.left;MY=e.clientY-r.top;
  });
  document.querySelector('.hero').addEventListener('touchmove',e=>{
    const r=cv.getBoundingClientRect();
    MX=e.touches[0].clientX-r.left;MY=e.touches[0].clientY-r.top;
  });
  document.querySelector('.hero').addEventListener('mouseleave',()=>{MX=-1;MY=-1;});
  window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(start,120);});
  start();
})();

/* ═══════════════════════
   APP
   ═══════════════════════ */
let imgs=[],vm=3,srt='date';
let serverJobs=[],currentTab='all';
const SERVER_URL=window.location.origin==='file://'?'http://localhost:3000':'';
let ws=null;

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');uploadToServer(e.dataTransfer.files);addF(e.dataTransfer.files)});

function initServerStatus(connected,message){
  const dot=document.getElementById('statusDot');
  const navDot=document.getElementById('navDot');
  const text=document.getElementById('statusText');
  const navStatus=document.getElementById('navStatus');
  if(connected){
    dot.classList.remove('offline');
    navDot.classList.remove('offline');
    text.textContent=message||'后端已连接';
    navStatus.textContent='Unity';
  }else{
    dot.classList.add('offline');
    navDot.classList.add('offline');
    text.textContent=message||'后端未连接';
    navStatus.textContent='离线';
  }
}

function connectWS(){
  if(!SERVER_URL)return;
  const wsUrl=SERVER_URL.replace('http','ws');
  try{
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{initServerStatus(true,'WebSocket 已连接');loadJobs();};
    ws.onmessage=e=>{
      const data=JSON.parse(e.data);
      if(data.type==='job_update')updateJob(data.job);
    };
    ws.onclose=()=>{initServerStatus(false,'连接已断开');setTimeout(connectWS,3000);};
    ws.onerror=()=>{initServerStatus(false,'连接失败');};
  }catch(e){initServerStatus(false,'连接失败');}
}

async function loadJobs(){
  try{
    const res=await fetch(`${SERVER_URL}/api/jobs`);
    const data=await res.json();
    if(data.success){serverJobs=data.jobs;renderProcessGallery();}
  }catch(e){console.error(e);}
}

function updateJob(job){
  const idx=serverJobs.findIndex(j=>j.id===job.id);
  if(idx>=0)serverJobs[idx]=job;else serverJobs.unshift(job);
  renderProcessGallery();
}

async function uploadToServer(files){
  if(!files||files.length===0)return;
  const fd=new FormData();
  Array.from(files).forEach(f=>fd.append('images',f));
  try{
    const res=await fetch(`${SERVER_URL}/api/upload`,{method:'POST',body:fd});
    const data=await res.json();
    if(data.success){
      data.jobs.forEach(j=>{if(!serverJobs.find(x=>x.id===j.id))serverJobs.unshift(j);});
      renderProcessGallery();
    }
  }catch(e){console.error('上传失败:',e);}
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.pg-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProcessGallery();
}

function getStatusBadge(status){
  const map={
    pending:{cls:'st-pending',text:'等待',icon:''},
    processing:{cls:'st-processing',text:'处理',icon:'<div class="st-spinner"></div>'},
    completed:{cls:'st-completed',text:'完成',icon:''},
    error:{cls:'st-error',text:'失败',icon:''}
  };
  const s=map[status]||map.pending;
  return `<span class="st-badge ${s.cls}">${s.icon}${s.text}</span>`;
}

function renderProcessGallery(){
  const g=document.getElementById('processGallery');
  document.getElementById('pgCount').textContent=serverJobs.length+' 个';
  
  let filtered=serverJobs;
  if(currentTab==='processing')filtered=serverJobs.filter(j=>j.status==='pending'||j.status==='processing');
  else if(currentTab==='completed')filtered=serverJobs.filter(j=>j.status==='completed');
  
  if(filtered.length===0){
    g.innerHTML=`<div class="emp"><div class="ei"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div class="et">暂无处理任务</div><div class="es">上传图片后将自动处理</div></div>`;
    return;
  }
  
  g.className='gm';
  g.innerHTML='';
  
  filtered.forEach((job,i)=>{
    const card=document.createElement('div');
    card.className='gc2';
    card.style.animationDelay=(i*40)+'ms';
    const n=job.name.length>26?job.name.slice(0,24)+'…':job.name;
    const imgUrl=job.outputUrl?`${SERVER_URL}${job.outputUrl}`:`${SERVER_URL}${job.inputUrl}`;
    
    card.innerHTML=`<img src="${imgUrl}" alt="" loading="lazy" onclick="olb('${imgUrl}')"/>
      ${job.status==='completed'?'<div class="processed-tag">Unity</div>':''}
      <div class="ov">
        <div class="on2">${n}</div>
        <div class="om">${getStatusBadge(job.status)}</div>
        <div class="oas">
          <div class="ob" onclick="olb('${imgUrl}')"><svg viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5"/></svg>查看</div>
          ${job.status==='completed'?`<div class="ob" onclick="downloadImg('${imgUrl}','${job.name}')"><svg viewBox="0 0 10 10"><path d="M5 1v6"/><polyline points="2 5 5 8 8 5"/></svg>保存</div>`:''}
        </div>
      </div>`;
    g.appendChild(card);
  });
}

function downloadImg(url,name){
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
}

function addF(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/')&&!f.name.match(/\.(heic|raw|dng|cr2|nef|arw|orf)$/i))return;
    imgs.push({url:URL.createObjectURL(f),name:f.name,size:f.size,ts:Date.now()+imgs.length});
  });
  render();
}

function rm(i){URL.revokeObjectURL(imgs[i].url);imgs.splice(i,1);render();}
function fs(b){if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return(b/1048576).toFixed(1)+' MB';}

function olb(url){document.getElementById('lbi').src=url;document.getElementById('lb').classList.add('open');}
function clb(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')clb();});

function render(){
  document.getElementById('hn').textContent=imgs.length;
  document.getElementById('gct').textContent=imgs.length+' 张';
  const g=document.getElementById('gallery');

  if(!imgs.length){
    g.className='';
    g.innerHTML='';
    return;
  }

  let s=[...imgs.map((x,i)=>({...x,ri:i}))];
  if(srt==='name')s.sort((a,b)=>a.name.localeCompare(b.name));
  else if(srt==='size')s.sort((a,b)=>b.size-a.size);
  else s.sort((a,b)=>b.ts-a.ts);

  g.className='gm';
  g.innerHTML='';

  s.forEach((img,i)=>{
    const card=document.createElement('div');
    card.className='gc2';
    card.style.animationDelay=(i*40)+'ms';
    const n=img.name.length>26?img.name.slice(0,24)+'…':img.name;

    card.innerHTML=`<img src="${img.url}" alt="" loading="lazy" onclick="olb('${img.url}')"/>
      <div class="ov">
        <div class="on2">${n}</div>
        <div class="om">${fs(img.size)}</div>
        <div class="oas">
          <div class="ob" onclick="olb('${img.url}')"><svg viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5"/></svg>查看</div>
          <div class="ob" onclick="rm(${img.ri})"><svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>移除</div>
        </div>
      </div>`;
    g.appendChild(card);
  });
}

render();
connectWS();
</script>
